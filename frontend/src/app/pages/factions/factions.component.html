<section id="factions" style="background-image: url('/assets/pict/factions/theLastOfUsFactions.webp');">
    <div class="navbar navbar-expand">
        <div class="navbar-brand">
            <img src="/assets/pict/main/theLastOfUsLogo.png" [routerLink]="'/main'" class="img-fluid w-100" alt="tlouLogo" />
        </div>
        <button id="btnBar" type="button" data-bs-toggle="offcanvas" data-bs-target="#showLigth" aria-controls="showLigth"><i class="fas fa-bars"></i></button>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" data-bs-target="#univers">UNIVERS</a>
                    <div class="dropdown-menu" id="univers">
                        <a href="#" class="dropdown-item" [routerLink]="'/factions'">FACTIONS</a>
                        <a href="#" class="dropdown-item" [routerLink]="'/infectes'">INFECTES</a>
                    </div>
                </li>
                <li class="nav-item"><a href="#" class="nav-link" [routerLink]="'/characters'">PERSONNAGES</a></li>
                <li class="nav-item dropdown">
                    <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" data-bs-target="#media">MEDIA</a>
                    <div class="dropdown-menu" id="media">
                        <a href="#" class="dropdown-item" [routerLink]="'/serieTv'">SERIE TV</a>
                        <a href="#" class="dropdown-item" [routerLink]="'/americanDreams'">AMERICAN DREAMS</a>
                    </div>
                </li>
            <button type="button" id="btnSubscribe" [routerLink]="'/subscribe'">ABONNEMENT</button>
            </ul>
        </div>
    </div>
    <div class="containFactions">
        <h2 class="different">FACTIONS RENCONTRES DANS LES JEUX :</h2>
        <div class="row">
            <div class="col-lg-2" *ngFor="let factions of listFactions">
                 <img [src]="factions.pict" data-bs-toggle="modal" [attr.data-bs-target]="'#' + factions.modal" class="img-fluid w-100" alt="factionsPict" appCard />
                <div class="types">
                    <p class="name">{{factions.name}}</p>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p class="copy">© The Last Of Us 2024</p>
    </div>
    
    <div class="modal fade" *ngFor="let factions of listFactions" [id]="factions.modal">
        <button type="button" id="btnCloseModal" data-bs-dismiss="modal"><i class="fas fa-times"></i></button>
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body">
                    <img [src]="factions.group" class="img-fluid w-100" alt="group" />
                    <p class="info">{{factions.what}}</p>
                </div>
            </div>
        </div>
    </div>

    <app-show-ligth></app-show-ligth>
</section>
